name: app test

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.number || github.sha }}
  cancel-in-progress: true

jobs:
  test:
    name: test app
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup Maven Action
        uses: s4u/setup-maven-action@v1.18.0

      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: install
        run: |
          npm i -g pnpm@10.20.0
          pnpm install

      - name: build
        run: |
          echo "=== Memory usage before build ==="
          free -h
          df -h
          echo "=== Process info ==="
          ps aux --sort=-%mem | head -20
          
          echo "=== Building ember-native ==="
          (cd ember-native && pnpm build)
          
          echo "=== Memory usage after ember-native build ==="
          free -h
          
          echo "=== Building demo-app with debug logs ==="
          export DEBUG="*"
          export GRADLE_OPTS="-Dorg.gradle.debug=true -Dorg.gradle.logging.level=debug -Xmx4g -XX:+HeapDumpOnOutOfMemoryError -XX:HeapDumpPath=/tmp/heap_dump.hprof"
          
          # Monitor memory in background
          (while true; do 
            echo "=== Memory check at $(date) ==="
            free -h
            echo "=== Top memory consumers ==="
            ps aux --sort=-%mem | head -10
            sleep 30
          done) &
          MONITOR_PID=$!
          
          # Run build with timeout
          timeout 600 bash -c 'cd demo-app && pnpm tns build android --log trace' || {
            EXIT_CODE=$?
            echo "=== Build failed or timed out with exit code: $EXIT_CODE ==="
            echo "=== Final memory state ==="
            free -h
            df -h
            echo "=== Running processes ==="
            ps aux --sort=-%mem | head -30
            kill $MONITOR_PID 2>/dev/null || true
            exit $EXIT_CODE
          }
          
          kill $MONITOR_PID 2>/dev/null || true
          
          echo "=== Memory usage after build ==="
          free -h
          df -h

      - name: Enable KVM group perms
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Gradle cache
        uses: gradle/actions/setup-gradle@v3

      - name: AVD cache
        uses: actions/cache@v4
        id: avd-cache
        with:
          path: |
            ~/.android/avd/*
            ~/.android/adb*
          key: avd-34

      - name: create AVD and generate snapshot for caching
        if: steps.avd-cache.outputs.cache-hit != 'true'
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 34
          arch: x86_64
          force-avd-creation: false
          emulator-options: -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -camera-back none
          disable-animations: false
          script: echo "Generated AVD snapshot for caching."

      - name: run tests
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 34
          arch: x86_64
          force-avd-creation: false
          emulator-options: -no-snapshot-save -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -camera-back none
          disable-animations: true
          script: |
            adb uninstall "org.nativescript.embernativedemo" || echo "pass";
            cd demo-app && npx -y nativescript test android --emulator
